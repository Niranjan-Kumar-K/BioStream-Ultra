<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | AMR Scout</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --amr: #ff4757; --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --card: white; --text: #333; }
        [data-theme="dark"] { --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 40px; color: var(--text); transition: 0.5s; font-weight: 900; }
        .glass-panel { background: var(--card); padding: 40px; border-radius: 25px; max-width: 850px; margin: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .btn-back { text-decoration: none; color: var(--text); border: 3px solid var(--amr); padding: 10px 20px; border-radius: 50px; transition: 0.3s; display: inline-block; margin-bottom: 25px; font-size: 0.8rem; }
        .btn-back:hover { background: var(--amr); color: white; }
        h1 { font-size: 2.5rem; color: var(--amr); margin: 0 0 25px 0; }
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; font-family: 'Inter'; font-weight: 900; margin-bottom: 15px; box-sizing: border-box; }
        .alert-box { margin-top: 25px; padding: 25px; border-radius: 18px; border: 3px solid var(--amr); background: rgba(255,71,87,0.1); font-size: 1.2rem; text-align: center; font-weight: 900; color: var(--amr); }
    </style>
</head>
<body>
    <a href="/" class="btn-back">RETURN TO HUB</a>
    <div class="glass-panel">
        <h1>AMR SCOUT</h1>
        <form method="POST"><textarea name="sequence" rows="4" placeholder="PASTE SEQ..."></textarea><button type="submit" style="width:100%; padding:18px; border-radius:12px; background:var(--amr); border:none; color:white; font-weight:900; cursor:pointer;">SCREEN SEQUENCE</button></form>
        {% if amr_results %}<div class="alert-box">{{ amr_results }}</div>{% endif %}
    </div>
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</body>
</html>
