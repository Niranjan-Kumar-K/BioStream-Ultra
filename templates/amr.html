<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | AMR Scout</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --danger: #ff4757; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --input-bg: rgba(0,0,0,0.2);
            --gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .light-theme {
            --bg: #fff5f5; --card: #ffffff; --text: #1a1a1a; --input-bg: #fee2e2;
            --gradient: linear-gradient(135deg, #fff5f5 0%, #ffe4e6 100%);
        }
        body { background: var(--bg); background-image: var(--gradient); background-attachment: fixed; font-family: 'Inter'; padding: 40px; color: var(--text); font-weight: 900; transition: 0.3s; min-height: 100vh; margin: 0; }
        .btn-back { text-decoration: none; color: var(--text); border: 3px solid #444; padding: 10px 25px; border-radius: 50px; display: inline-flex; align-items: center; margin-bottom: 25px; font-size: 0.8rem; transition: 0.3s; text-transform: uppercase; }
        .btn-back:hover { background: var(--text); color: var(--bg); }
        .glass-panel { background: var(--card); padding: 40px; border-radius: 25px; max-width: 900px; margin: auto; border: 1px solid rgba(255, 71, 87, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .btn-ghost { width: 100%; padding: 18px; border-radius: 12px; border: 3px solid var(--danger); color: var(--danger); background: transparent; cursor: pointer; font-weight: 900; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-ghost:hover { background: var(--danger) !important; color: white !important; }
        
        /* BOX FIX BUD */
        input, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(128,128,128,0.3); background: var(--input-bg); color: var(--text); margin-bottom: 10px; box-sizing: border-box; font-family: 'Inter'; font-weight: 900; outline: none; resize: none; }
        
        .amr-card { background: var(--input-bg); padding: 25px; border-radius: 15px; border-left: 5px solid var(--danger); display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .gene-name { color: var(--danger); font-size: 1.5rem; }
        .scroll-box { max-height: 120px; overflow-y: auto; background: rgba(0,0,0,0.05); padding: 12px; border-radius: 10px; font-size: 0.8rem; color: var(--danger); margin-top: 10px; }
    </style>
</head>
<body>
    <a href="/" class="btn-back">HUB</a>
    <div class="glass-panel">
        <h1 style="color: var(--danger); text-align: center; font-size: 2.5rem; margin-top: 0;">AMR SCOUT</h1>
        <form method="POST" style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="hidden" name="action" value="fetch"><input type="text" name="accession_id" placeholder="NCBI ACCESSION ID">
            <button type="submit" class="btn-ghost" style="width: auto; padding: 0 30px; margin-top:0;">SCAN</button>
        </form>
        <form method="POST"><textarea name="sequence" rows="4" placeholder="PASTE SEQUENCE">{{ input_seq }}</textarea><button type="submit" class="btn-ghost">EXECUTE SCAN</button></form>
        {% if amr_results %}{% for result in amr_results %}
            <div class="amr-card">
                <div><span class="gene-name">{{ result.gene }}</span><br><small>TYPE: {{ result.type }}</small><div class="scroll-box">{{ result.sequence }}</div></div>
                <div style="text-align: right;"><span style="color: var(--danger);">LOC: {{ result.location }}</span><br><span>THREAT</span></div>
            </div>
        {% endfor %}{% endif %}
    </div>
    <script>
        function applyTheme() {
            const theme = localStorage.getItem('theme');
            if (theme === 'light') document.documentElement.classList.add('light-theme');
            else document.documentElement.classList.remove('light-theme');
        }
        applyTheme();
        setInterval(applyTheme, 500);
    </script>
</body>
</html>
