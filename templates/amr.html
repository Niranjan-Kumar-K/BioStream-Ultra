<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | AMR Scout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --amr: #ff4757; --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --card: white; --text: #333; }
        [data-theme="dark"] { --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 40px; color: var(--text); transition: 0.5s; }
        .glass-panel { background: var(--card); padding: 40px; border-radius: 25px; max-width: 800px; margin: auto; }
        .btn-back { text-decoration: none; color: var(--text); font-weight: 900; border: 2px solid var(--amr); padding: 10px 20px; border-radius: 50px; transition: 0.3s; }
        .btn-back:hover { background: var(--amr); color: white; }
        h1 { font-weight: 900; color: var(--amr); }
        .alert-box { margin-top: 20px; padding: 20px; border-radius: 15px; border: 2px solid var(--amr); background: rgba(255,71,87,0.1); font-weight: 900; }
    </style>
</head>
<body>
    <a href="/" class="btn-back">← HUB</a><br><br>
    <div class="glass-panel">
        <h1>AMR SCOUT</h1>
        <form method="POST"><textarea name="sequence" rows="4" style="width:100%; margin:20px 0; border-radius:12px; border:1px solid #ddd; padding:15px; font-weight:900;" placeholder="PASTE BACTERIAL SEQ..."></textarea><button type="submit" style="width:100%; padding:15px; background:var(--amr); border:none; color:white; font-weight:900; border-radius:12px; cursor:pointer;">SCAN</button></form>
        {% if amr_results %}<div class="alert-box">{{ amr_results }}</div>{% endif %}
    </div>
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</body>
</html>
