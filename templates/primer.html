<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Primer Lab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #4facfe; --deep-blue: #00f2fe; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-back { display: inline-block; padding: 10px 20px; background: white; border-radius: 30px; color: #333; text-decoration: none; font-weight: 900; font-size: 0.75rem; border: 1px solid #ddd; margin-bottom: 20px; }
        .glass-panel { background: rgba(255,255,255,0.9); padding: 40px; border-radius: 25px; width: 100%; max-width: 850px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { font-weight: 900; background: linear-gradient(to bottom, var(--primary-blue), var(--deep-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; font-family: 'Inter'; font-weight: 900; box-sizing: border-box; }
        .btn-exec { width:100%; padding:18px; margin-top:10px; border-radius:12px; background: white; border: 2px solid var(--primary-blue); color: var(--primary-blue); font-weight:900; cursor:pointer; transition: 0.3s; }
        /* BLUE HOVER FOR PRIMER */
        .btn-exec:hover { background: var(--primary-blue); color: white; box-shadow: 0 0 20px rgba(79,172,254,0.4); }
        .primer-card { background: white; padding: 20px; border-radius: 15px; border-bottom: 4px solid var(--primary-blue); margin-top: 15px; }
    </style>
</head>
<body>
    <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> RETURN TO HUB</a>
    <div class="glass-panel">
        <h1>PRIMER LAB</h1>
        <form method="POST">
            <textarea name="sequence" rows="4" placeholder="INPUT TEMPLATE STRAND..."></textarea>
            <button type="submit" class="btn-exec">DESIGN PRIMERS</button>
        </form>
        {% if primer_results %}
        <div class="primer-card">
            <div style="font-weight:900; color:var(--primary-blue)">FORWARD ({{ primer_results.f_tm }}°C):</div>
            <div style="word-break:break-all; font-family:monospace; font-weight:900">{{ primer_results.f_primer }}</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
