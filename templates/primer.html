<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Primer Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primer: #4facfe; --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --card: white; --text: #333; }
        [data-theme="dark"] { --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 40px; color: var(--text); transition: 0.5s; font-weight: 900; }
        .glass-panel { background: var(--card); padding: 50px; border-radius: 30px; max-width: 900px; margin: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .btn-back { text-decoration: none; color: var(--text); border: 3px solid var(--primer); padding: 12px 25px; border-radius: 50px; transition: 0.3s; display: inline-block; margin-bottom: 30px; }
        .btn-back:hover { background: var(--primer); color: white; box-shadow: 0 0 20px rgba(79,172,254,0.4); }
        h1 { font-size: 3rem; color: var(--primer); margin-bottom: 30px; letter-spacing: -2px; }
        textarea { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #ddd; font-family: 'Inter'; font-weight: 900; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; }
        .primer-results { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .primer-card { background: rgba(79,172,254,0.1); padding: 25px; border-radius: 20px; border-left: 8px solid var(--primer); }
        .stat-label { color: #888; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .primer-seq { word-break: break-all; font-size: 1.2rem; color: var(--text); }
        .tm-value { font-size: 1.5rem; color: var(--primer); margin-bottom: 10px; }
    </style>
</head>
<body>
    <a href="/" class="btn-back">RETURN TO HUB</a>
    <div class="glass-panel">
        <h1>PRIMER LAB</h1>
        <form method="POST">
            <textarea name="sequence" rows="4" placeholder="INPUT TEMPLATE STRAND..."></textarea>
            <button type="submit" style="width:100%; padding:20px; border-radius:15px; background:var(--primer); border:none; color:white; font-weight:900; font-size:1.1rem; cursor:pointer;">GENERATE PRIMER PAIR</button>
        </form>
        {% if primer_results %}
        <div class="primer-results">
            <div class="primer-card">
                <span class="stat-label">Forward Primer (5' → 3')</span>
                <div class="tm-value">**{{ primer_results.f_tm }}°C**</div>
                <div class="primer-seq">**{{ primer_results.f_primer }}**</div>
            </div>
            <div class="primer-card">
                <span class="stat-label">Reverse Primer (5' → 3')</span>
                <div class="tm-value">**{{ primer_results.r_tm }}°C**</div>
                <div class="primer-seq">**{{ primer_results.r_primer }}**</div>
            </div>
        </div>
        {% endif %}
    </div>
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</body>
</html>
