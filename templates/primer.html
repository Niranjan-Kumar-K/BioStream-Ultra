<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Primer Lab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primer: #4facfe; --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --card: white; --text: #333; }
        [data-theme="dark"] { --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 40px; color: var(--text); transition: 0.5s; font-weight: 900; }
        .glass-panel { background: var(--card); padding: 40px; border-radius: 25px; max-width: 850px; margin: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .btn-back { text-decoration: none; color: var(--text); border: 3px solid var(--primer); padding: 10px 20px; border-radius: 50px; transition: 0.3s; display: inline-block; margin-bottom: 25px; font-size: 0.8rem; }
        .btn-back:hover { background: var(--primer); color: white; }
        h1 { font-size: 2.5rem; color: var(--primer); margin: 0 0 25px 0; }
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; font-family: 'Inter'; font-weight: 900; margin-bottom: 15px; box-sizing: border-box; }
        .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .p-card { background: rgba(79,172,254,0.1); padding: 20px; border-radius: 18px; border-left: 6px solid var(--primer); }
        .p-seq { word-break: break-all; font-size: 1rem; color: var(--text); font-weight: 900; margin-top: 5px; }
    </style>
</head>
<body>
    <a href="/" class="btn-back">RETURN TO HUB</a>
    <div class="glass-panel">
        <h1>PRIMER LAB</h1>
        <form method="POST"><textarea name="sequence" rows="4" placeholder="INPUT STRAND..."></textarea><button type="submit" style="width:100%; padding:18px; border-radius:12px; background:var(--primer); border:none; color:white; font-weight:900; cursor:pointer;">DESIGN PRIMERS</button></form>
        {% if primer_results %}
        <div class="p-grid">
            <div class="p-card"><span style="color:#888; font-size:0.7rem;">FORWARD ({{ primer_results.f_tm }}°C)</span><div class="p-seq">{{ primer_results.f_primer }}</div></div>
            <div class="p-card"><span style="color:#888; font-size:0.7rem;">REVERSE ({{ primer_results.r_tm }}°C)</span><div class="p-seq">{{ primer_results.r_primer }}</div></div>
        </div>
        {% endif %}
    </div>
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</body>
</html>
