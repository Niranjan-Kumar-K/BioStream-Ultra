<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary-green: #00ff88; 
            --deep-green: #00ad5e; 
        }

        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* FIXED SLIMY TEXT LOGIC */
        .title-container {
            position: relative;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -3px;
            text-transform: uppercase;
            
            /* The Magic: Clip everything to the text */
            color: transparent;
            background: #e1e1e1; /* Base "empty" color */
            position: relative;
            background-clip: text;
            -webkit-background-clip: text;
        }

        /* This is the actual moving liquid layer */
        .liquid-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, var(--primary-green), var(--deep-green));
            
            /* Clip this layer to the text too */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            
            /* Use a mask to create the wavy movement */
            mask-image: url('https://raw.githubusercontent.com/front-end-rookie/fluid-text-animation/main/wave.png');
            -webkit-mask-image: url('https://raw.githubusercontent.com/front-end-rookie/fluid-text-animation/main/wave.png');
            mask-size: 200% 100%;
            -webkit-mask-size: 200% 100%;
            
            animation: moveWave 4s infinite linear;
            z-index: 2;
        }

        @keyframes moveWave {
            0% { mask-position: 0% 50%; -webkit-mask-position: 0% 50%; }
            100% { mask-position: 100% 50%; -webkit-mask-position: 100% 50%; }
        }

        /* Hub Layout Styles */
        p { color: #888; font-weight: 900; margin-bottom: 40px; letter-spacing: 2px; font-size: 0.8rem; text-transform: uppercase; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 230px); gap: 25px; }
        .menu-card { 
            background: white; padding: 45px 20px; border-radius: 30px; text-decoration: none; 
            color: #333; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-bottom: 6px solid #ddd; text-align: center;
        }
        .menu-card i { font-size: 2.8rem; display: block; margin-bottom: 15px; }
        .menu-card:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,255,136,0.2); }
        
        /* Interactive Colors */
        .card-analyzer:hover { border-color: var(--primary-green); }
        .card-amr:hover { border-color: #ff4757; }
        .card-primer:hover { border-color: #4facfe; }

        .status-bar { margin-top: 60px; font-size: 0.7rem; color: #aaa; letter-spacing: 3px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="title-container">
        <h1>
            BIOSTREAM ULTRA
            <div class="liquid-overlay">BIOSTREAM ULTRA</div>
        </h1>
    </div>
    <p>Advanced Genomic Computation Suite v2.0</p>

    <div class="menu-grid">
        <a href="/analyzer" class="menu-card card-analyzer">
            <i class="fas fa-microscope" style="color: var(--primary-green);"></i>
            DNA ANALYZER
        </a>
        <a href="/amr" class="menu-card card-amr">
            <i class="fas fa-shield-virus" style="color: #ff4757;"></i>
            AMR SCOUT
        </a>
        <a href="/primer" class="menu-card card-primer">
            <i class="fas fa-dna" style="color: #4facfe;"></i>
            PRIMER LAB
        </a>
    </div>

    <div class="status-bar">
        <span style="color:var(--primary-green)">●</span> SYSTEM STATUS: OPTIMAL | DB: BIOPYTHON
    </div>

</body>
</html>
