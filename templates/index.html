<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary-green: #00ff88; 
            --deep-green: #00ad5e; 
        }

        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* SLIMY RANDOM LIQUID LOGIC */
        .title-container {
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -3px;
            text-transform: uppercase;
            position: relative;
            color: rgba(0,0,0,0.05); /* The "Ghost" background of the letters */
            z-index: 1;
        }

        /* The Liquid Layer */
        .liquid {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, var(--primary-green), var(--deep-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 2;
            /* Masking the liquid to the text */
            pointer-events: none;
        }

        /* The Slime Wave Overlay */
        h1::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: #f5f7fa; /* Matches page background to "cut" the liquid */
            border-radius: 40%; /* Creates the wobbly/slimy curve */
            animation: slimeFlow 6s infinite linear;
            z-index: 3;
            pointer-events: none;
        }

        @keyframes slimeFlow {
            0% { transform: rotate(0deg) translateY(45%); }
            50% { transform: rotate(180deg) translateY(55%); }
            100% { transform: rotate(360deg) translateY(45%); }
        }

        /* Hub Layout Styles */
        p { color: #888; font-weight: 900; margin-bottom: 40px; letter-spacing: 2px; font-size: 0.8rem; text-transform: uppercase; z-index: 4; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 230px); gap: 25px; z-index: 4; }
        .menu-card { 
            background: white; padding: 45px 20px; border-radius: 30px; text-decoration: none; 
            color: #333; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-bottom: 6px solid #ddd; text-align: center;
        }
        .menu-card i { font-size: 2.8rem; display: block; margin-bottom: 15px; }
        .menu-card:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,255,136,0.2); }
        
        /* Interactive Colors */
        .card-analyzer:hover { border-color: var(--primary-green); }
        .card-amr:hover { border-color: #ff4757; }
        .card-primer:hover { border-color: #4facfe; }

        .status-bar { margin-top: 60px; font-size: 0.7rem; color: #aaa; letter-spacing: 3px; font-weight: 900; z-index: 4; }
    </style>
</head>
<body>

    <div class="title-container">
        <h1>
            BIOSTREAM ULTRA
            <div class="liquid">BIOSTREAM ULTRA</div>
        </h1>
    </div>
    <p>Advanced Genomic Computation Suite v2.0</p>

    <div class="menu-grid">
        <a href="/analyzer" class="menu-card card-analyzer">
            <i class="fas fa-microscope" style="color: var(--primary-green);"></i>
            DNA ANALYZER
        </a>
        <a href="/amr" class="menu-card card-amr">
            <i class="fas fa-shield-virus" style="color: #ff4757;"></i>
            AMR SCOUT
        </a>
        <a href="/primer" class="menu-card card-primer">
            <i class="fas fa-dna" style="color: #4facfe;"></i>
            PRIMER LAB
        </a>
    </div>

    <div class="status-bar">
        <span style="color:var(--primary-green)">●</span> SYSTEM STATUS: OPTIMAL | DB: BIOPYTHON
    </div>

</body>
</html>
