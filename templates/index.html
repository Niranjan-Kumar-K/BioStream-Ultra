<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-green: #00ff88; 
            --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            --card: white; 
            --text: #333; 
            --border: #ddd;
            --particle-opacity: 0.15;
            --particle-color: #0f172a;
        }
        
        [data-theme="dark"] { 
            --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            --card: #1e293b; 
            --text: #f8fafc; 
            --border: #334155;
            --particle-opacity: 0.2;
            --particle-color: var(--primary-green);
        }

        body { 
            background: var(--bg); 
            background-attachment: fixed;
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            margin:0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: 0.3s ease; 
            color: var(--text); 
            overflow: hidden; /* Vital for the flow logic Bud */
            position: relative;
        }

        /* --- THE FLOWING PARTICLES --- */
        .bio-flow-item {
            position: absolute;
            color: var(--particle-color);
            opacity: var(--particle-opacity);
            pointer-events: none;
            z-index: 1;
            will-change: transform;
            transition: color 0.5s ease, opacity 0.5s ease;
            top: 0;
            left: 0;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .theme-toggle { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: var(--card); 
            color: var(--text); 
            border: 2px solid var(--primary-green); 
            padding: 12px 22px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 0.75rem; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--primary-green);
            color: #0f172a;
        }

        h1 { 
            font-size: 4rem; 
            font-weight: 900; 
            background: linear-gradient(to bottom, #00ff88, #00ad5e); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: -2px; 
        }

        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 260px); 
            gap: 25px; 
            margin-top: 35px; 
        }

        .menu-card { 
            background: var(--card); 
            padding: 50px 20px; 
            border-radius: 30px; 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 900; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-bottom: 6px solid var(--border); 
            text-align: center; 
        }

        .menu-card i { font-size: 3rem; margin-bottom: 15px; display: block; }
        .menu-card:hover { transform: translateY(-10px); }
        .card-analyzer:hover { border-color: #00ff88; box-shadow: 0 15px 30px rgba(0, 255, 136, 0.3); }
        .card-amr:hover { border-color: #ff4757; box-shadow: 0 15px 30px rgba(255, 71, 87, 0.3); }
        .card-primer:hover { border-color: #4facfe; box-shadow: 0 15px 30px rgba(79, 172, 254, 0.3); }
        .card-vault:hover { border-color: #a855f7; box-shadow: 0 15px 30px rgba(168, 85, 247, 0.3); }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i> THEME
    </button>

    <div id="ui-layer">
        <h1>BIOSTREAM ULTRA</h1>

        <div class="menu-grid">
            <a href="/analyzer" class="menu-card card-analyzer">
                <i class="fas fa-microscope" style="color: #00ff88;"></i>
                ANALYZER
            </a>
            
            <a href="/amr" class="menu-card card-amr">
                <i class="fas fa-shield-virus" style="color: #ff4757;"></i>
                AMR SCOUT
            </a>
            
            <a href="/primer" class="menu-card card-primer">
                <i class="fas fa-dna" style="color: #4facfe;"></i>
                PRIMER LAB
            </a>
            
            <a href="/vault" class="menu-card card-vault">
                <i class="fas fa-vault" style="color: #a855f7;"></i>
                THE VAULT
            </a>
        </div>
    </div>

    <script>
        const icons = ['fa-dna', 'fa-virus', 'fa-bacterium'];
        const particles = [];
        const particleCount = 20;
        const buffer = 150; // Pixels off-screen before wrap Bud

        class BioParticle {
            constructor() {
                this.el = document.createElement('i');
                this.el.className = `fas ${icons[Math.floor(Math.random() * icons.length)]} bio-flow-item`;
                
                const size = Math.random() * 2 + 1.5;
                this.el.style.fontSize = `${size}rem`;
                
                this.spawn();
                document.body.appendChild(this.el);
            }

            spawn() {
                // Random start position
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                
                // Professional speed vector (Slow and steady Bud)
                this.vx = (Math.random() - 0.5) * 1.8; 
                this.vy = (Math.random() - 0.5) * 1.8; 
                
                // Prevent particles from being "stale" (too slow)
                if(Math.abs(this.vx) < 0.3) this.vx = 0.5;
                if(Math.abs(this.vy) < 0.3) this.vy = -0.5;

                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 0.4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;

                const winW = window.innerWidth;
                const winH = window.innerHeight;

                // IMPROVED WRAP LOGIC BUD
                // X-Axis Wrap
                if (this.x > winW + buffer) this.x = -buffer;
                else if (this.x < -buffer) this.x = winW + buffer;

                // Y-Axis Wrap
                if (this.y > winH + buffer) this.y = -buffer;
                else if (this.y < -buffer) this.y = winH + buffer;

                this.el.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) rotate(${this.rotation}deg)`;
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new BioParticle());
        }

        function animate() {
            particles.forEach(p => p.update());
            requestAnimationFrame(animate);
        }
        animate();

        // Handle window resizing Bud
        window.addEventListener('resize', () => {
            particles.forEach(p => p.spawn());
        });

        function toggleTheme() {
            const body = document.documentElement;
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        }

        function updateIcon(theme) {
            const icon = document.querySelector('.theme-toggle i');
            icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateIcon('dark');
        }
    </script>
</body>
</html>
