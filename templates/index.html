<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #00ff88; --deep-green: #00ad5e; --amr-red: #ff4757; --primer-blue: #4facfe; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Inter', sans-serif; height: 100vh; margin:0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }

        h1 { 
            font-size: 4.5rem; font-weight: 900; margin: 0; letter-spacing: -3px;
            background: linear-gradient(to bottom, var(--primary-green), var(--deep-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            /* Applying the Jelly Filter */
            filter: url(#jelly);
            transition: transform 0.3s ease;
        }
        h1:hover { transform: scale(1.02); filter: none; /* Clears up on hover */ }

        p { color: #888; font-weight: 900; margin-bottom: 40px; letter-spacing: 2px; font-size: 0.8rem; text-transform: uppercase; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 230px); gap: 25px; }
        .menu-card { background: white; padding: 45px 20px; border-radius: 30px; text-decoration: none; color: #333; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-bottom: 6px solid #ddd; text-align: center; }
        .menu-card i { font-size: 2.8rem; display: block; margin-bottom: 15px; }
        .menu-card:hover { transform: translateY(-15px); }
        .card-analyzer:hover { border-color: var(--primary-green); box-shadow: 0 20px 40px rgba(0,255,136,0.25); }
        .card-amr:hover { border-color: var(--amr-red); box-shadow: 0 20px 40px rgba(255,71,87,0.25); }
        .card-primer:hover { border-color: var(--primer-blue); box-shadow: 0 20px 40px rgba(79,172,254,0.25); }
        .status-bar { margin-top: 60px; font-size: 0.7rem; color: #aaa; letter-spacing: 3px; font-weight: 900; }
    </style>
</head>
<body>

    <h1>BIOSTREAM ULTRA</h1>
    <p>Advanced Genomic Computation Suite v2.1</p>

    <div class="menu-grid">
        <a href="/analyzer" class="menu-card card-analyzer">
            <i class="fas fa-microscope" style="color: var(--primary-green);"></i> DNA ANALYZER
        </a>
        <a href="/amr" class="menu-card card-amr">
            <i class="fas fa-shield-virus" style="color: var(--amr-red);"></i> AMR SCOUT
        </a>
        <a href="/primer" class="menu-card card-primer">
            <i class="fas fa-dna" style="color: var(--primer-blue);"></i> PRIMER LAB
        </a>
    </div>

    <div class="status-bar">
        <span style="color:var(--primary-green)">●</span> SYSTEM STATUS: OPTIMAL | DB: BIOPYTHON
    </div>

    <svg xmlns="http://www.w3.org/2000/svg" version="1.1" style="display:none;">
        <defs>
          <filter id="jelly">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="warp">
              <animate attributeName="baseFrequency" from="0.015" to="0.025" dur="5s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap xChannelSelector="R" yChannelSelector="G" scale="15" in="SourceGraphic" in2="warp" />
          </filter>
        </defs>
    </svg>
</body>
</html>
