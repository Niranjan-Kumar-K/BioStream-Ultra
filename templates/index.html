<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #00ff88; --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --card: white; --text: #333; }
        [data-theme="dark"] { --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; height: 100vh; margin:0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; color: var(--text); }
        .theme-toggle { position: absolute; top: 20px; right: 20px; background: var(--card); color: var(--text); border: 2px solid var(--primary-green); padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: 900; font-size: 0.8rem; }
        h1 { font-size: 5.5rem; font-weight: 900; background: linear-gradient(to bottom, #00ff88, #00ad5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin: 0; letter-spacing: -4px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 280px); gap: 30px; margin-top: 40px; }
        .menu-card { background: var(--card); padding: 60px 20px; border-radius: 35px; text-decoration: none; color: var(--text); font-weight: 900; transition: 0.4s; border-bottom: 8px solid #ddd; text-align: center; font-size: 1.1rem; }
        .menu-card i { font-size: 3.5rem; margin-bottom: 20px; display: block; }
        .card-analyzer:hover { transform: translateY(-12px); border-color: #00ff88; box-shadow: 0 15px 30px rgba(0, 255, 136, 0.3); }
        .card-amr:hover { transform: translateY(-12px); border-color: #ff4757; box-shadow: 0 15px 30px rgba(255, 71, 87, 0.3); }
        .card-primer:hover { transform: translateY(-12px); border-color: #4facfe; box-shadow: 0 15px 30px rgba(79, 172, 254, 0.3); }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 THEME</button>
    <h1>BIOSTREAM ULTRA</h1>
    <div class="menu-grid">
        <a href="/analyzer" class="menu-card card-analyzer"><i class="fas fa-microscope" style="color: #00ff88;"></i>ANALYZER</a>
        <a href="/amr" class="menu-card card-amr"><i class="fas fa-shield-virus" style="color: #ff4757;"></i>AMR SCOUT</a>
        <a href="/primer" class="menu-card card-primer"><i class="fas fa-dna" style="color: #4facfe;"></i>PRIMER LAB</a>
    </div>
    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</body>
</html>
