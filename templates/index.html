<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #00ff88; --deep-green: #00ad5e; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
        .hub-container { text-align: center; }
        h1 { font-size: 3rem; font-weight: 900; background: linear-gradient(to bottom, var(--primary-green), var(--deep-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 200px); gap: 20px; }
        .menu-card { background: white; padding: 30px; border-radius: 20px; text-decoration: none; color: #333; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; border-bottom: 5px solid #ddd; }
        .menu-card:hover { transform: translateY(-10px); border-color: var(--primary-green); }
    </style>
</head>
<body>
    <div class="hub-container">
        <h1>BIOSTREAM ULTRA</h1>
        <div class="menu-grid">
            <a href="/analyzer" class="menu-card">DNA ANALYZER</a>
            <a href="/amr" class="menu-card">AMR SCOUT</a>
            <a href="/primer" class="menu-card">PRIMER LAB</a>
        </div>
    </div>
</body>
</html>
