<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioStream | Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --card: white; --text: #333; }
        [data-theme="dark"] { --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 40px; color: var(--text); transition: 0.5s; }
        .glass-panel { background: var(--card); padding: 40px; border-radius: 25px; max-width: 800px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-back { text-decoration: none; color: var(--text); font-weight: 900; border: 2px solid var(--primary); padding: 10px 20px; border-radius: 50px; transition: 0.3s; }
        .btn-back:hover { background: var(--primary); color: white; }
        h1 { font-weight: 900; background: linear-gradient(to bottom, #00ff88, #00ad5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin: 20px 0; box-sizing: border-box; font-family: 'Inter'; font-weight: 900; }
        .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-card { background: rgba(0,255,136,0.1); padding: 15px; border-radius: 15px; border-bottom: 4px solid var(--primary); }
    </style>
</head>
<body>
    <a href="/" class="btn-back">← HUB</a><br><br>
    <div class="glass-panel">
        <h1>DNA ANALYZER</h1>
        <form method="POST"><textarea name="sequence" rows="4" placeholder="PASTE SEQUENCE..."></textarea><button type="submit" style="width:100%; padding:15px; border-radius:12px; background:var(--primary); border:none; color:white; font-weight:900; cursor:pointer;">ANALYZE</button></form>
        {% if results %}
        <div class="results-grid" style="margin-top:20px;">
            <div class="stat-card"><small>LENGTH</small><div>{{ results.length }} bp</div></div>
            <div class="stat-card"><small>DNA MASS</small><div>{{ results.dna_mass }}</div></div>
            <div class="stat-card"><small>PROT MASS</small><div>{{ results.protein_mass }}</div></div>
        </div>
        <div class="stat-card" style="margin-top:15px;"><small>TRANSLATION</small><div style="word-break:break-all;">{{ results.translation }}</div></div>
        {% endif %}
    </div>
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</body>
</html>
